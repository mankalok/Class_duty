<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>志盈教室報表中心</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --success: #34a853; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 20px; padding-top: 0; margin-top: 0; }
        
        /* 導航列 */
        .nav-bar { background: #333; padding: 10px 20px; display: flex; align-items: center; gap: 15px; margin: 0 -20px 20px -20px; }
        .btn-home { color: white; text-decoration: none; font-weight: bold; background: #555; padding: 5px 12px; border-radius: 4px; font-size: 14px; transition: 0.3s; }
        .btn-home:hover { background: #666; }
        .nav-title { color: #ccc; font-size: 14px; }

        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 分頁標籤 */
        .tab-group { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ddd; gap: 5px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #eee; border-radius: 8px 8px 0 0; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }

        .no-print-section { background: #fff; padding: 15px; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        
        /* 報表排版 - 這裡是關鍵 */
        .report-page { 
            background: white; 
            padding: 30px; 
            margin-bottom: 30px; 
            border: 1px solid #ddd;
            page-break-after: always; /* 強制列印時分頁 */
        }
        
        h2.report-header { border-bottom: 3px solid var(--primary); padding-bottom: 10px; color: var(--primary); font-size: 22px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; table-layout: fixed; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; word-wrap: break-word; }
        th { background: #f2f2f2; font-size: 14px; }
        td { font-size: 14px; }

        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 13px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-orange { background: #f39c12; color: white; }

        /* 列印專用 CSS */
        @media print {
            .no-print, .tab-group, .no-print-section, .nav-bar { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; padding: 0; margin: 0; border: none; }
            .report-page { border: none; margin: 0; padding: 10mm; width: 100%; box-sizing: border-box; }
            /* 縮小字體以確保一頁印完 */
            table { font-size: 11pt; }
            th, td { padding: 6px !important; }
            h2.report-header { font-size: 18pt; }
        }
    </style>
</head>
<body>

<div class="nav-bar no-print">
    <a href="index.html" class="btn-home">🏠 返主頁</a>
    <span class="nav-title">志盈教室管理系統 > 報表中心</span>
</div>

<div class="container">
    <div class="tab-group no-print">
        <button class="tab-btn active" onclick="switchTab(this, 'tab-gen')">📋 課表生成</button>
        <button class="tab-btn" onclick="switchTab(this, 'tab-free')">🕵️ 空堂偵測</button>
    </div>

    <div id="tab-gen" class="tab-content">
        <div class="no-print no-print-section">
            <h3 style="margin-top:0">📄 批量報表生成</h3>
            <p style="font-size: 13px; color: #666;">系統會按選擇進行分組，每一組（例如每一班）印出時會自動分成新一頁。</p>
            <div class="btn-group">
                <button class="btn btn-blue" onclick="genReport('teacher')">👨‍🏫 按老師分頁</button>
                <button class="btn btn-blue" onclick="genReport('class')">🏫 按班別分頁</button>
                <button class="btn btn-blue" onclick="genReport('topic')">📚 按課題分頁</button>
                <button class="btn btn-green" onclick="window.print()">🖨️ 列印全部</button>
            </div>
        </div>
        <div id="reportRenderArea">
            <div style="text-align:center; color:#ccc; padding:50px;">請點擊按鈕生成報表內容...</div>
        </div>
    </div>

    <div id="tab-free" class="tab-content" style="display:none;">
        <div class="no-print no-print-section">
            <h3 style="margin-top:0">🕵️ 老師空堂偵測報表</h3>
            <p style="font-size: 13px; color: #666;">根據已排好的課程，自動搵出邊個老師喺邊段日子係冇堂上嘅。</p>
            <div class="btn-group">
                <button class="btn btn-orange" onclick="genFreeReport()">🔍 生成空堂報告</button>
                <button class="btn btn-green" onclick="window.print()">🖨️ 列印報告</button>
            </div>
        </div>
        <div id="freeRenderArea"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFpcWn2zuErCYgb7Pcc0_25rZ4uRONILyXVAqknfQ67CRDl04h8Bes-JnSp-bi16rn/exec";
    let db = { staff: [], final: [] };

    // 分頁切換
    function switchTab(btn, tabId) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        btn.classList.add('active');
        document.getElementById(tabId).style.display = 'block';
    }

    async function fetchLatest() {
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getSystemData' }) });
            db = await res.json();
        } catch(e) { console.error("Fetch failed", e); }
    }

    // 生成課表/進度表
    async function genReport(mode) {
        if(!db.final || db.final.length === 0) await fetchLatest();
        const area = document.getElementById('reportRenderArea');
        area.innerHTML = ""; 

        let groups = {};
        db.final.forEach(r => {
            let key = (mode === 'teacher') ? r.TeacherName : (mode === 'class' ? r.ClassName : r.TopicName);
            if(!groups[key]) groups[key] = [];
            groups[key].push(r);
        });

        Object.keys(groups).sort().forEach(groupName => {
            groups[groupName].sort((a,b) => new Date(a.Date) - new Date(b.Date));
            const page = document.createElement('div');
            page.className = 'report-page';
            
            let titlePrefix = mode === 'teacher' ? "老師個人課表" : (mode === 'class' ? "班別課程進度" : "課題開班紀錄");
            
            page.innerHTML = `
                <h2 class="report-header">${titlePrefix} - ${groupName}</h2>
                <table>
                    <thead>
                        <tr>
                            <th style="width:25%">日期</th>
                            <th>${mode === 'teacher' ? '上堂班別' : (mode === 'class' ? '負責老師' : '參與班別')}</th>
                            <th>教學課題</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${groups[groupName].map(item => `
                            <tr>
                                <td>${item.Date.split('T')[0]}</td>
                                <td>${mode === 'teacher' ? item.ClassName : (mode === 'class' ? item.TeacherName : item.ClassName)}</td>
                                <td>${item.TopicName}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                <div style="margin-top:15px; text-align:right; font-size:11px; color:#999;">
                    志盈教室管理系統 | 列印日期：${new Date().toLocaleDateString()}
                </div>
            `;
            area.appendChild(page);
        });
    }

    // 生成空堂報告
    async function genFreeReport() {
        if(!db.staff || db.staff.length === 0) await fetchLatest();
        const area = document.getElementById('freeRenderArea');
        area.innerHTML = "<p style='text-align:center'>正在計算...</p>";

        const allStaff = db.staff.map(s => s.TeacherName);
        const dates = [...new Set(db.final.map(r => r.Date.split('T')[0]))].sort();

        let html = `<div class="report-page"><h2 class="report-header">老師空堂偵測表</h2>`;
        html += `<table><thead><tr><th>日期</th><th>空堂/不需上堂之老師</th></tr></thead><tbody>`;

        dates.forEach(dt => {
            const busyStaff = db.final.filter(r => r.Date.split('T')[0] === dt).map(r => r.TeacherName);
            const freeStaff = allStaff.filter(s => !busyStaff.includes(s));
            
            html += `<tr>
                <td style="font-weight:bold">${dt}</td>
                <td style="text-align:left; line-height:1.5">${freeStaff.join(', ') || '<span style="color:#ccc">所有老師均有課</span>'}</td>
            </tr>`;
        });

        html += `</tbody></table></div>`;
        area.innerHTML = html;
    }

    window.onload = fetchLatest;
</script>
</body>
</html>
