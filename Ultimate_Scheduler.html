<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>牽引班全自動排課系統</title>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --danger: #ea4335; --bg: #f8f9fa; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 20px; padding-top: 0; }
        
        /* 導航列 */
        .nav-bar { background: #333; padding: 10px 20px; display: flex; align-items: center; gap: 15px; margin: 0 -20px 20px -20px; }
        .btn-home { color: white; text-decoration: none; font-weight: bold; background: #555; padding: 5px 12px; border-radius: 4px; font-size: 14px; transition: 0.3s; }
        .btn-home:hover { background: #666; }
        .nav-title { color: #ccc; font-size: 14px; }

        .container { max-width: 98vw; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .nav-tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 25px; }
        .tab-btn { padding: 12px 30px; cursor: pointer; border: none; background: #eee; font-size: 16px; font-weight: bold; border-radius: 8px 8px 0 0; margin-right: 5px; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: center; min-width: 150px; }
        th { background: #f1f3f4; position: sticky; top: 0; z-index: 10; font-size: 13px; }
        .sticky-col { position: sticky; left: 0; background: white !important; font-weight: bold; z-index: 11; border-right: 2px solid #ddd; min-width: 80px; }

        .date-chip { display: inline-flex; align-items: center; background: #e8f0fe; color: #1967d2; padding: 5px 12px; border-radius: 20px; margin: 3px; border: 1px solid #c2e7ff; font-size: 14px; }
        .date-chip span { margin-left: 8px; color: var(--danger); cursor: pointer; font-weight: bold; }
        
        .filter-bar { background: #f1f3f4; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .btn { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-red { background: var(--danger); color: white; }
        .btn-gray { background: #7f8c8d; color: white; }

        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; }
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="index.html" class="btn-home">🏠 返主頁</a>
    <span class="nav-title">牽引班管理系統 > 日子與班別編排</span>
</div>

<div id="loading">⌛ <span id="loadMsg">正在讀取數據...</span></div>

<div class="container">
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'step1')">📅 1. 日期定義</button>
        <button class="tab-btn" onclick="switchTab(event, 'step2')">📊 2. 班別課題</button>
    </div>

    <div id="step1" class="tab-content">
        <h2>第一步：設定各輪次日子</h2>
        <div class="filter-bar">
            <button class="btn btn-orange" onclick="exportCSV('round')">📤 匯出日期 CSV</button>
            <button class="btn btn-gray" onclick="document.getElementById('csvIn1').click()">📥 匯入日期 CSV</button>
            <input type="file" id="csvIn1" style="display:none" accept=".csv" onchange="importCSV(this, 'round')">
        </div>
        <table id="roundTable">
            <thead><tr><th>輪次名稱</th><th>已選日期 (DatePicker)</th><th>新增日期</th><th>操作</th></tr></thead>
            <tbody id="roundBody"></tbody>
        </table>
        <div style="margin-top:20px;">
            <button class="btn btn-blue" onclick="addRoundRow()">+ 增加一輪</button>
            <button class="btn btn-green" style="float:right;" onclick="saveRounds()">💾 儲存日期至雲端</button>
        </div>
    </div>

    <div id="step2" class="tab-content" style="display:none;">
        <h2>第二步：班別課題</h2>
        <div class="filter-bar">
            <strong>篩選級別：</strong>
            <button class="btn" onclick="filterRows('ALL')">全部</button>
            <div id="levelFilter" style="display:inline-block"></div>
            
            <button class="btn btn-red" style="margin-left:15px;" onclick="clearMatrix()">🗑️ 一鍵清空矩陣</button>

            <div style="margin-left:auto">
                <button class="btn btn-orange" onclick="exportCSV('matrix')">📤 匯出矩陣 CSV</button>
                <button class="btn btn-gray" onclick="document.getElementById('csvIn2').click()">📥 匯入矩陣 CSV</button>
                <input type="file" id="csvIn2" style="display:none" accept=".csv" onchange="importCSV(this, 'matrix')">
            </div>
        </div>
        <div style="overflow: auto; max-height: 550px; border: 1px solid #ddd;">
            <table><thead id="mHead"></thead><tbody id="mBody"></tbody></table>
        </div>
        <button class="btn btn-green" style="margin-top:20px; float:right;" onclick="saveMatrix()">💾 儲存課題至雲端</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxHciM7aMPxYY1V8R2LY_y945MUI9o3ftFyCCrp9s55iO34UeOQN0uzpljtdcksHVSt/exec"; 
    let db = { staff:[], topics:[], rounds:[], matrix:[], classes:[] };

    async function init() {
        showLoading(true, "正在獲取最新資料...");
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getSystemData' }) });
            db = await res.json();
            renderRounds();
            renderLevelBtns();
        } catch(e) { alert("讀取失敗，請檢查 SCRIPT_URL"); }
        showLoading(false);
    }

    function switchTab(evt, id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        evt.currentTarget.classList.add('active');
        if(id === 'step2') renderMatrix();
    }

    // --- 第一步：日期處理 ---
    function renderRounds() {
        const body = document.getElementById('roundBody');
        const data = (db.rounds && db.rounds.length) ? db.rounds : [{RoundName:"第一輪", Dates:""}];
        body.innerHTML = data.map(r => `<tr>
            <td><input type="text" class="r-name" value="${r.RoundName || ''}" style="width:90%"></td>
            <td class="chip-container">${(r.Dates || '').split(',').filter(d=>d).map(d=>`<div class="date-chip">${d}<span onclick="this.parentElement.remove()">×</span></div>`).join('')}</td>
            <td><input type="date" onchange="addTag(this)"></td>
            <td><button class="btn btn-red" onclick="this.parentElement.parentElement.remove()">🗑️</button></td>
        </tr>`).join('');
    }

    function addTag(input) {
        if(!input.value) return;
        input.parentElement.previousElementSibling.insertAdjacentHTML('beforeend', `<div class="date-chip">${input.value}<span onclick="this.parentElement.remove()">×</span></div>`);
        input.value = "";
    }

    function addRoundRow() {
        document.getElementById('roundBody').insertAdjacentHTML('beforeend', `<tr><td><input type="text" class="r-name" placeholder="例如：新輪次"></td><td class="chip-container"></td><td><input type="date" onchange="addTag(this)"></td><td><button class="btn btn-red" onclick="this.parentElement.parentElement.remove()">🗑️</button></td></tr>`);
    }

    // --- 第二步：課題矩陣連動邏輯 ---
    function renderLevelBtns() {
        const lvls = [...new Set(db.classes.map(c => c.Level))].sort();
        document.getElementById('levelFilter').innerHTML = lvls.map(l => `<button class="btn" onclick="filterRows('${l}')">${l}</button>`).join('');
    }

    function renderMatrix() {
        const h = document.getElementById('mHead'), b = document.getElementById('mBody');
        const rounds = Array.from(document.querySelectorAll('.r-name')).map(i => i.value).filter(v=>v);
        
        h.innerHTML = `<tr><th class="sticky-col">班別</th>${rounds.map(r => `<th>${r}</th>`).join('')}</tr>`;
        
        b.innerHTML = db.classes.map(c => {
            const lvTopics = db.topics.filter(t => String(t.Level).trim() === String(c.Level).trim());
            return `<tr data-cls="${c.ClassName}" data-lvl="${c.Level}">
                <td class="sticky-col">${c.ClassName}</td>
                ${rounds.map(rn => {
                    const match = db.matrix.find(m => String(m.ClassName) === String(c.ClassName) && String(m.RoundName) === String(rn));
                    return `<td>
                        <select class="m-sel" data-cls="${c.ClassName}" data-rn="${rn}" onchange="updateRowOptions(this)">
                            <option value="">--</option>
                            ${lvTopics.map(t => `<option value="${t.TopicName}" ${t.TopicName===(match?match.TopicName:"")?'selected':''}>${t.TopicName}</option>`).join('')}
                        </select>
                    </td>`;
                }).join('')}
            </tr>`;
        }).join('');

        // 初始執行一次，隱藏已選中課題
        document.querySelectorAll('#mBody tr').forEach(tr => {
            const firstSel = tr.querySelector('.m-sel');
            if(firstSel) updateRowOptions(firstSel);
        });
    }

    // 同行互斥邏輯
    function updateRowOptions(changedSelect) {
        const tr = changedSelect.closest('tr');
        const rowSelects = tr.querySelectorAll('.m-sel');
        const selectedValues = Array.from(rowSelects).map(s => s.value).filter(v => v !== "");

        rowSelects.forEach(sel => {
            const cur = sel.value;
            Array.from(sel.options).forEach(opt => {
                if (opt.value === "") return;
                if (selectedValues.includes(opt.value) && opt.value !== cur) {
                    opt.style.display = 'none';
                    opt.disabled = true;
                } else {
                    opt.style.display = 'block';
                    opt.disabled = false;
                }
            });
        });
    }

    // 一鍵清空
    function clearMatrix() {
        if(!confirm("確定要清空所有已選課題嗎？")) return;
        document.querySelectorAll('.m-sel').forEach(sel => sel.value = "");
        document.querySelectorAll('#mBody tr').forEach(tr => {
            const firstSel = tr.querySelector('.m-sel');
            if(firstSel) updateRowOptions(firstSel);
        });
    }

    function filterRows(lv) {
        document.querySelectorAll('#mBody tr').forEach(r => r.style.display = (lv === 'ALL' || r.dataset.lvl === lv) ? '' : 'none');
    }

    // --- 儲存與 CSV 功能 ---
    async function api(action, data) {
        showLoading(true, "正在同步到雲端...");
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
            const result = await res.text();
            alert(result);
            init(); // 重新整理資料
        } catch(e) { alert("儲存失敗"); }
        showLoading(false);
    }

    function saveRounds() {
        const data = Array.from(document.querySelectorAll('#roundBody tr')).map(tr => {
            return [tr.querySelector('.r-name').value, Array.from(tr.querySelectorAll('.date-chip')).map(c=>c.firstChild.textContent).join(',')];
        });
        api('saveRounds', data);
    }

    function saveMatrix() {
        const data = Array.from(document.querySelectorAll('.m-sel')).filter(s => s.value).map(s => {
            return [s.dataset.cls, s.dataset.rn, s.value];
        });
        api('saveMatrix', data);
    }

    function exportCSV(type) {
        let csv = "";
        if (type === 'round') {
            csv = "RoundName,Dates\n";
            document.querySelectorAll('#roundBody tr').forEach(tr => {
                const name = tr.querySelector('.r-name').value;
                const dates = Array.from(tr.querySelectorAll('.date-chip')).map(c => c.firstChild.textContent).join('|');
                csv += `${name},${dates}\n`;
            });
        } else {
            const rounds = Array.from(document.querySelectorAll('.r-name')).map(i => i.value).filter(v=>v);
            csv = "ClassName," + rounds.join(",") + "\n";
            document.querySelectorAll('#mBody tr').forEach(tr => {
                const cls = tr.dataset.cls;
                const vals = Array.from(tr.querySelectorAll('.m-sel')).map(s => s.value);
                csv += `${cls},${vals.join(",")}\n`;
            });
        }
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${type}_data.csv`;
        link.click();
    }

    function importCSV(input, type) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const rows = e.target.result.split("\n").map(r => r.split(","));
            if (type === 'round') {
                const body = document.getElementById('roundBody');
                body.innerHTML = "";
                rows.slice(1).forEach(r => {
                    if (r.length < 2 || !r[0]) return;
                    const dates = r[1].split('|').map(d => `<div class="date-chip">${d.trim()}<span onclick="this.parentElement.remove()">×</span></div>`).join('');
                    body.insertAdjacentHTML('beforeend', `<tr><td><input type="text" class="r-name" value="${r[0]}"></td><td class="chip-container">${dates}</td><td><input type="date" onchange="addTag(this)"></td><td><button class="btn btn-red" onclick="this.parentElement.parentElement.remove()">🗑️</button></td></tr>`);
                });
            } else {
                rows.slice(1).forEach(r => {
                    const cls = r[0].trim();
                    const tr = document.querySelector(`#mBody tr[data-cls="${cls}"]`);
                    if (tr) {
                        const selects = tr.querySelectorAll('.m-sel');
                        r.slice(1).forEach((val, i) => { if(selects[i]) selects[i].value = val.trim(); });
                        if(selects[0]) updateRowOptions(selects[0]);
                    }
                });
            }
            alert("匯入完成，請記得撳儲存！");
            input.value = "";
        };
        reader.readAsText(input.files[0]);
    }

    function showLoading(s, m) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; document.getElementById('loadMsg').textContent = m; }
    window.onload = init;
</script>
</body>
</html>
